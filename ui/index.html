<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Slice 11 follow-up: keep maximum-scale=1 + user-scalable=no
         even though iOS often ignores them; the JS zoom block in
         main.tsx is the real load-bearing piece. viewport-fit=cover
         was tried and didn't address the iOS whitespace gap, so it's
         removed pending Web Inspector diagnostics. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#fafaf7" />
    <!-- Slice 11 follow-up: pre-CSS reset that loads before any
         component stylesheet. Belt-and-braces against user-agent
         default margins on iOS Safari and against any rogue padding
         that creeps in via Vite's HMR ordering. The repeated
         `!important` is intentional — these rules MUST win. -->
    <style>
      html, body, #root {
        margin: 0 !important;
        padding: 0 !important;
      }
      /* Use the dynamic viewport height so the page sizes correctly
         when iOS Safari's URL bar shows / hides. `100vh` on iOS
         measures the *largest* possible viewport and bleeds content
         under the URL bar at scrollY=0; `100dvh` follows the actual
         visible viewport. */
      .app {
        min-height: 100dvh;
      }
    </style>
    <title>Floyd County, VA — Civic Hub</title>
    <meta name="description" content="Vote on local issues and see where our community stands. Floyd County, Virginia Civic Hub." />
    <meta property="og:title" content="Floyd County, VA — Civic Hub" />
    <meta property="og:description" content="Vote on local issues and see where our community stands." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- TEMPORARY: Slice 11 follow-up diagnostic pill. Renders a tiny
         fixed-position panel in the top-right showing the .hub-banner's
         distance from the viewport top and any padding on html / body /
         .app. Used to diagnose the iOS Chrome whitespace gap. Remove
         this block once the gap is fixed. -->
    <script>
      (function () {
        function paint() {
          var banner = document.querySelector('.hub-banner');
          var app = document.querySelector('.app');
          var s = function (el) { return el ? getComputedStyle(el) : null; };
          var html = document.documentElement;
          var body = document.body;
          var info = {
            bannerTop: banner ? Math.round(banner.getBoundingClientRect().top) : 'n/a',
            innerH: window.innerHeight,
            scrollY: window.scrollY,
            htmlPadT: s(html).paddingTop,
            bodyPadT: s(body).paddingTop,
            bodyMarT: s(body).marginTop,
            appPadT: app ? s(app).paddingTop : 'n/a',
            appMarT: app ? s(app).marginTop : 'n/a',
            ua: navigator.userAgent.slice(0, 60),
          };
          var pill = document.getElementById('__layout_diag__');
          if (!pill) {
            pill = document.createElement('div');
            pill.id = '__layout_diag__';
            pill.style.cssText =
              'position:fixed;top:8px;right:8px;z-index:2147483647;' +
              'background:#000;color:#0f0;font:11px/1.3 ui-monospace,monospace;' +
              'padding:6px 8px;border-radius:6px;max-width:60vw;' +
              'white-space:pre-wrap;word-break:break-all;pointer-events:auto;' +
              'border:1px solid #0f0;opacity:0.92';
            pill.addEventListener('click', function () { pill.remove(); });
            document.body.appendChild(pill);
          }
          pill.textContent = Object.keys(info).map(function (k) {
            return k + ':' + info[k];
          }).join('\n');
        }
        // Wait for React to mount + first paint.
        if (document.readyState === 'complete') setTimeout(paint, 200);
        else window.addEventListener('load', function () { setTimeout(paint, 200); });
        // Repaint on resize / orientationchange in case something shifts.
        window.addEventListener('resize', paint);
        window.addEventListener('orientationchange', paint);
      })();
    </script>
  </body>
</html>
