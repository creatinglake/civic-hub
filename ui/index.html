<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Slice 11 follow-up: keep maximum-scale=1 + user-scalable=no
         even though iOS often ignores them; the JS zoom block in
         main.tsx is the real load-bearing piece. viewport-fit=cover
         was tried and didn't address the iOS whitespace gap, so it's
         removed pending Web Inspector diagnostics. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#fafaf7" />
    <!-- Slice 11 follow-up: pre-CSS reset that loads before any
         component stylesheet. Belt-and-braces against user-agent
         default margins on iOS Safari and against any rogue padding
         that creeps in via Vite's HMR ordering. The repeated
         `!important` is intentional — these rules MUST win. -->
    <style>
      html, body, #root {
        margin: 0 !important;
        padding: 0 !important;
      }
      /* Use the dynamic viewport height so the page sizes correctly
         when iOS Safari's URL bar shows / hides. `100vh` on iOS
         measures the *largest* possible viewport and bleeds content
         under the URL bar at scrollY=0; `100dvh` follows the actual
         visible viewport. */
      .app {
        min-height: 100dvh;
      }
    </style>
    <!-- Slice 18 — title / OG metadata are env-driven via Vite's
         %VITE_VAR% substitution so per-deployment Vercel projects
         (Floyd production, civic.social demo, future per-county
         hubs) render their own branding from the same `main` build.
         Defaults below match Floyd; overrides go in each Vercel
         project's Production-scoped env vars. -->
    <title>%VITE_HUB_PAGE_TITLE%</title>
    <meta name="description" content="%VITE_HUB_DESCRIPTION%" />
    <meta property="og:title" content="%VITE_HUB_PAGE_TITLE%" />
    <meta property="og:description" content="%VITE_HUB_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <!-- Static OG image. The SPA can't inject per-vote OG tags
         (crawlers don't run JS), so every shared link unfurls
         with the Hub banner + generic title. Per-vote OG would
         need a server-side bot-detection rewrite (Slice 15.1
         candidate). -->
    <meta property="og:image" content="%VITE_HUB_BANNER_URL%" />
    <meta property="og:image:alt" content="%VITE_HUB_BANNER_ALT%" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
